services:
  db:
    image: postgres:16
    container_name: armavour-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-armavour}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-armavour}
      POSTGRES_DB: ${POSTGRES_DB:-armavour}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - armavour_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-armavour} -d ${POSTGRES_DB:-armavour}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: armavour-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"

volumes:
  armavour_postgres_data:
